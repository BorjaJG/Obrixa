name: 🚀 Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: ☕ Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: 📦 Grant execute permission
        run: chmod +x gradlew

      - name: 🏗️ Build project
        run: ./gradlew build

      - name: 🧪 Run tests
        run: ./gradlew test

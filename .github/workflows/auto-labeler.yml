name: 🏷️ Auto Label Maker

on:
  pull_request:
    types: [opened]

jobs:
  labeler:
    runs-on: ubuntu-latest
    steps:
      - name: 🤖 Label & Create
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              { name: 'type: feature', color: '0E8A16', description: 'Nuevas funciones' },
              { name: 'type: bug', color: 'D93F0B', description: 'Algo no funciona' },
              { name: 'type: refactor', color: 'FBCA04', description: 'Mejora de código' },
              { name: 'priority: critical', color: 'B60205', description: 'Urgente' }
            ];

            // Crear etiquetas si no existen
            for (const label of labels) {
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                  color: label.color,
                  description: label.description
                });
              } catch (e) {
                // Si ya existe, da error y lo ignoramos
              }
            }

            // Asignar etiqueta según la rama
            const branch = context.payload.pull_request.head.ref.toLowerCase();
            let labelToAdd = '';
            if (branch.includes('feat')) labelToAdd = 'type: feature';
            if (branch.includes('fix') || branch.includes('bug')) labelToAdd = 'type: bug';
            
            if (labelToAdd) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: [labelToAdd]
              });
            }

name: 🤖 PR Automation

on:
  pull_request:
    types: [opened]

jobs:
  setup:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: 👤 Auto-assign & Label
        uses: actions/github-script@v7
        with:
          script: |
            // Asigna al creador
            github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              assignees: [context.payload.pull_request.user.login]
            });

            // Etiqueta según rama
            const ref = context.payload.pull_request.head.ref.toLowerCase();
            let labels = [];
            if (ref.includes('feat') || ref.includes('feature')) labels.push('enhancement');
            if (ref.includes('fix') || ref.includes('bug')) labels.push('bug');
            if (ref.includes('refactor')) labels.push('refactor');
            
            if (labels.length > 0) {
              github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: labels
              });
            }

name: 🤖 AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🧠 AI Code Reviewer
        uses: anc95/ChatGPT-CodeReview@v1 # Una de las más usadas y estables
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LANGUAGE: Spanish
          MODEL: gpt-4-turbo # O gpt-3.5-turbo para ahorrar
          PROMPT: "Actúa como un desarrollador Senior. Revisa el código buscando errores lógicos, problemas de seguridad y falta de adherencia a Clean Code."
